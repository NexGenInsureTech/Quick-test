<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Udaan V3</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <select id="userRole">
    <option value="usgi">USGI RM</option>
    <option value="bank">Bank RM</option>
    <option value="branch">Branch Manager</option>
    <option value="zonal">Zonal Manager</option>
  </select>
  <button onclick="login()">Enter</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none">

<header>
  <h2 id="roleTitle"></h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="panel">
<h3>Inputs</h3>

<label>GWP: <span id="gwp_val"></span></label>
<input type="range" id="gwp" min="500" max="2000" value="1000">

<label>Growth: <span id="growth_val"></span></label>
<input type="range" id="growth" min="5" max="30" value="15">

<label>Loss Ratio: <span id="lr_val"></span></label>
<input type="range" id="lr" min="60" max="90" value="75">

</div>

<div class="panel">
<h3>Outputs</h3>
<div id="ps"></div>
<div id="profit"></div>
<div id="roi"></div>
<div id="insights"></div>
<canvas id="chart"></canvas>
</div>

</div>

<div class="panel">
<h3>Leaderboard</h3>
<ul id="leaderboard"></ul>
</div>

</div>

<script src="auth.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bancassurance Command Center v5.1 (Full Restored)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>

<style>
body {font-family: Arial; margin:0; background:#f5f7fa;}
header {background:#1e3a8a; color:white; padding:15px; text-align:center;}
nav {display:flex; flex-wrap:wrap; background:#0f172a;}
nav button {flex:1; padding:10px; color:white; background:none; border:none; cursor:pointer;}
.section {display:none; padding:20px;}
.active {display:block;}
.card {background:white; padding:15px; margin:10px 0; border-radius:10px;}
.alert {color:#b91c1c; font-weight:bold;}
.slider {width:100%;}
pre {background:#f1f5f9; padding:10px;}
</style>
</head>
<body>

<header>
<h2>Bancassurance Command Center v5.1</h2>
</header>

<nav>
<button onclick="showTab('upload')">Upload</button>
<button onclick="showTab('predictive')">Predictive</button>
<button onclick="showTab('coa')">COA Optimizer</button>
<button onclick="showTab('campaign')">Campaign Engine</button>
<button onclick="showTab('monitor')">Monitoring</button>
<button onclick="showTab('doc')">Documentation</button>
<button onclick="exportPPT()">Export PPT</button>
</nav>

<div id="upload" class="section active"><div class="card">
<input type="file" id="fileInput" accept=".xlsx,.csv" />
<p id="status"></p>
</div></div>

<div id="predictive" class="section"><div class="card">
<h3>Predictive Targeting</h3>
<ul id="predictions"></ul>
</div></div>

<div id="coa" class="section"><div class="card">
<h3>COA Optimizer</h3>
<input type="range" min="0" max="50" value="10" id="coaSlider" class="slider" />
<p id="coaOutput"></p>
</div></div>

<div id="campaign" class="section"><div class="card">
<h3>Campaign Recommendations</h3>
<ul id="campaignList"></ul>
</div></div>

<div id="monitor" class="section"><div class="card">
<h3>Monitoring</h3>
<p id="monitorOutput"></p>
</div></div>

<div id="doc" class="section"><div class="card">
<h3>📘 Documentation</h3>
<pre>
Penetration = Policies / Customers
Score = (1-Pen)*0.4 + CASA*0.3 + (1-Digital)*0.3
Campaign: Low Pen → Cross-sell
COA: Premium × (1 + COA×0.5)
</pre>
</div></div>

<script>
let data=[];
let basePremium=0, basePolicies=1;

function showTab(tab){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(tab).classList.add('active');
}

// Upload

document.getElementById('fileInput').addEventListener('change', e=>{
 const reader=new FileReader();
 reader.onload=(evt)=>{
  const wb=XLSX.read(evt.target.result,{type:'array'});
  data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  process();
 };
 reader.readAsArrayBuffer(e.target.files[0]);
});

function process(){
 let preds=[], campaigns=[];
 basePremium=0; basePolicies=0;

 data.forEach(d=>{
  let premium=+d.Premium_Collected||0;
  let policies=+d.Policies_Sold||0;
  let customers=+d.Total_Customers||1;
  let casa=+d.CASA_Customers||0;
  let digital=+d.Digital_Policies_Sold||0;

  basePremium+=premium;
  basePolicies+=policies;

  let pen=policies/customers;
  let dig=digital/(policies||1);

  let score=(1-pen)*0.4 + (casa/100000)*0.3 + (1-dig)*0.3;

  if(score>0.5) preds.push(d.Branch_Name);

  if(pen<0.2) campaigns.push("Cross-sell: "+d.Branch_Name);
  if(dig<0.2) campaigns.push("Digital push: "+d.Branch_Name);
 });

 document.getElementById('predictions').innerHTML=preds.map(p=>`<li>${p}</li>`).join('');
 document.getElementById('campaignList').innerHTML=campaigns.map(c=>`<li>${c}</li>`).join('');

 updateCOA();
 updateMonitor();
}

// COA

document.getElementById('coaSlider').oninput=()=>updateCOA();

function updateCOA(){
 let coa=+document.getElementById('coaSlider').value;
 let newPremium=basePremium*(1+coa/100*0.5);
 document.getElementById('coaOutput').innerText=
 `Projected Premium ₹${(newPremium/1e7).toFixed(2)} Cr`;
}

// Monitoring
function updateMonitor(){
 let coaPerPolicy=(basePremium*0.1)/(basePolicies||1);
 let conversion=basePolicies/(data.length||1);
 document.getElementById('monitorOutput').innerText=
 `COA/Policy ₹${coaPerPolicy.toFixed(0)} | Conversion ${(conversion*100).toFixed(1)}%`;
}

// PPT
function exportPPT(){
 let ppt=new PptxGenJS();
 let slide=ppt.addSlide();
 slide.addText("Bancassurance Report",{x:1,y:1});
 slide.addText(document.getElementById('monitorOutput').innerText,{x:1,y:2});
 ppt.writeFile("Report.pptx");
}

</script>

</body>
</html>
